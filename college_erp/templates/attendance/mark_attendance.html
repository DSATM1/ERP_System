{% extends 'base.html' %}

{% block title %}Mark Attendance - College ERP{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="card">
        <div class="card-header">
            <h4 class="mb-0"><i class="bi bi-calendar-check"></i> Mark Attendance</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                <div class="row mb-4">
                    <div class="col-md-4">
                        <label class="form-label">Date</label>
                        <input type="date" name="date" class="form-control" value="{{ today }}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Subject</label>
                        <select name="subject" class="form-select" required>
                            <option value="">Select Subject</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Class/Semester</label>
                        <select name="semester" class="form-select" required>
                            <option value="">Select Semester</option>
                        </select>
                    </div>
                </div>

                <hr>

                <h5 class="mb-3">Student List</h5>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Roll No</th>
                                <th>Student Name</th>
                                <th>Present</th>
                                <th>Absent</th>
                                <th>Late</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="6" class="text-center text-muted">
                                    Select a semester to view students
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{% url 'attendance:attendance_list' %}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> Save Attendance
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
